# Render Blueprint — auto-configures the backend service
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: billguard-api
    runtime: python
    region: singapore  # closest to India
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
